<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Илмий Кенгаш — Панель секретаря</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #1a1a2e);
    --hint: var(--tg-theme-hint-color, #8e8e93);
    --link: var(--tg-theme-link-color, #2678b6);
    --btn: var(--tg-theme-button-color, #2678b6);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f0f5);
    --accent: #0d6e6e;
    --accent-light: #e8f5f5;
    --danger: #d64545;
    --danger-light: #fde8e8;
    --success: #2d8a4e;
    --success-light: #e6f5ec;
    --warning: #c58c07;
    --warning-light: #fef6e0;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #0d6e6e 0%, #14919b 100%);
    color: #fff;
    padding: 20px 16px 16px;
    text-align: center;
  }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .header p { font-size: 12px; opacity: 0.85; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--secondary-bg);
    padding: 4px;
    margin: 12px;
    border-radius: 10px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 6px;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: transparent;
    color: var(--hint);
  }
  .tab.active {
    background: var(--bg);
    color: var(--accent);
    box-shadow: var(--shadow);
  }

  /* ── Sections ── */
  .section { display: none; padding: 0 12px; }
  .section.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--bg);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-subtitle {
    font-size: 12px;
    color: var(--hint);
    margin-bottom: 6px;
  }

  /* ── Forms ── */
  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--hint);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--secondary-bg);
    color: var(--text);
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    width: 100%;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .btn-small { padding: 6px 12px; font-size: 12px; width: auto; }
  .btn-icon { width: 32px; height: 32px; padding: 0; border-radius: 6px; font-size: 16px; flex-shrink: 0; }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn-row .btn { flex: 1; }

  /* ── List items ── */
  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .list-item:last-child { border-bottom: none; }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name { font-size: 14px; font-weight: 500; }
  .list-item-detail { font-size: 11px; color: var(--hint); }
  .list-item-actions { display: flex; gap: 4px; }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-draft { background: var(--secondary-bg); color: var(--hint); }
  .badge-active { background: var(--success-light); color: var(--success); }
  .badge-closed { background: var(--danger-light); color: var(--danger); }
  .badge-registered { background: var(--success-light); color: var(--success); }
  .badge-pending { background: var(--warning-light); color: var(--warning); }

  /* ── Checkbox list ── */
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    cursor: pointer;
  }
  .checkbox-item input[type="checkbox"] {
    width: 20px; height: 20px;
    accent-color: var(--accent);
  }

  /* ── Back button ── */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-family: inherit;
    font-weight: 500;
  }

  /* ── Results ── */
  .result-bar {
    display: flex;
    height: 28px;
    border-radius: 6px;
    overflow: hidden;
    margin: 6px 0;
    background: var(--secondary-bg);
  }
  .result-bar div {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    min-width: 30px;
    transition: width 0.3s;
  }
  .bar-for { background: var(--success); }
  .bar-against { background: var(--danger); }
  .bar-abstain { background: var(--hint); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 30px 20px;
    color: var(--hint);
  }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }
  .empty-text { font-size: 13px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Session detail ── */
  .question-item {
    background: var(--secondary-bg);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .question-text { font-size: 13px; margin-bottom: 4px; }
  .question-meta { font-size: 11px; color: var(--hint); }
</style>
</head>
<body>

<div class="header">
  <h1>🏛 Илмий Кенгаш</h1>
  <p>Панель секретаря учёного совета</p>
</div>

<!-- Nav Tabs -->
<div class="tabs" id="mainTabs">
  <button class="tab active" onclick="showSection('members')">👥 Участники</button>
  <button class="tab" onclick="showSection('meetings')">📋 Заседания</button>
  <button class="tab" onclick="showSection('active')">🗳 Голосование</button>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- SECTION: Участники                         -->
<!-- ═══════════════════════════════════════════ -->
<div id="section-members" class="section active">
  <div class="card">
    <div class="card-title">➕ Добавить участника</div>
    <div class="form-group">
      <label>ФИО</label>
      <input type="text" id="memberName" placeholder="Иванов Иван Иванович">
    </div>
    <div class="form-group">
      <label>PIN-код (уникальный)</label>
      <input type="text" id="memberPin" placeholder="Например: 1234">
    </div>
    <button class="btn btn-primary" onclick="addMember()">Добавить</button>
  </div>

  <div class="card">
    <div class="card-title">👥 Список участников <span id="memberCount" class="badge badge-draft">0</span></div>
    <div id="membersList"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- SECTION: Заседания                         -->
<!-- ═══════════════════════════════════════════ -->
<div id="section-meetings" class="section">
  <!-- Список заседаний (или детали конкретного) -->
  <div id="meetingsListView">
    <div class="card">
      <div class="card-title">➕ Новое заседание</div>
      <div class="form-group">
        <label>Дата заседания</label>
        <input type="date" id="meetingDate">
      </div>
      <div class="form-group">
        <label>Номер протокола</label>
        <input type="text" id="meetingProtocol" placeholder="Например: 5">
      </div>
      <button class="btn btn-primary" onclick="createMeeting()">Создать заседание</button>
    </div>

    <div class="card">
      <div class="card-title">📋 Заседания</div>
      <div id="meetingsList"></div>
    </div>
  </div>

  <!-- Детали заседания -->
  <div id="meetingDetailView" style="display:none;">
    <button class="back-btn" onclick="backToMeetings()">← Назад к заседаниям</button>
    <div id="meetingDetail"></div>
  </div>

  <!-- Детали сеанса -->
  <div id="sessionDetailView" style="display:none;">
    <button class="back-btn" onclick="backToMeeting()">← Назад к заседанию</button>
    <div id="sessionDetail"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- SECTION: Активное голосование              -->
<!-- ═══════════════════════════════════════════ -->
<div id="section-active" class="section">
  <div id="activeVotingContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // ── State ──
  let members = [];
  let meetings = [];
  let currentMeetingId = null;
  let currentSessionId = null;

  // ── Init ──
  loadData();

  // ── Navigation ──
  function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    if (name === 'meetings') {
      backToMeetings();
    }
    if (name === 'active') {
      renderActiveVoting();
    }
  }

  // ── Data ──
  function loadData() {
    const stored = localStorage.getItem('ilmiy_members');
    if (stored) members = JSON.parse(stored);

    const storedM = localStorage.getItem('ilmiy_meetings');
    if (storedM) meetings = JSON.parse(storedM);

    renderMembers();
    renderMeetings();
  }

  function saveData() {
    localStorage.setItem('ilmiy_members', JSON.stringify(members));
    localStorage.setItem('ilmiy_meetings', JSON.stringify(meetings));
  }

  function sendToBot(data) {
    try {
      tg.sendData(JSON.stringify(data));
    } catch(e) {
      console.log('sendData error (expected outside Telegram):', e);
    }
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ═══════════════════════════════════════════
  //  УЧАСТНИКИ
  // ═══════════════════════════════════════════

  function addMember() {
    const name = document.getElementById('memberName').value.trim();
    const pin = document.getElementById('memberPin').value.trim();
    if (!name || !pin) { showToast('Заполните ФИО и PIN'); return; }
    if (members.find(m => m.pin === pin)) { showToast('Этот PIN уже занят'); return; }

    members.push({ name, pin, registered: false });
    saveData();
    renderMembers();

    sendToBot({ action: 'add_member', name, pin });

    document.getElementById('memberName').value = '';
    document.getElementById('memberPin').value = '';
    showToast('✅ Участник добавлен');
  }

  function removeMember(pin) {
    if (!confirm('Удалить участника?')) return;
    members = members.filter(m => m.pin !== pin);
    saveData();
    renderMembers();
    sendToBot({ action: 'remove_member', pin });
    showToast('Участник удалён');
  }

  function renderMembers() {
    document.getElementById('memberCount').textContent = members.length;
    const container = document.getElementById('membersList');

    if (!members.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Нет участников. Добавьте членов учёного совета.</div></div>';
      return;
    }

    container.innerHTML = members.map(m => `
      <div class="list-item">
        <div class="list-item-info">
          <div class="list-item-name">${m.name}</div>
          <div class="list-item-detail">PIN: ${m.pin}
            <span class="badge ${m.registered ? 'badge-registered' : 'badge-pending'}">
              ${m.registered ? 'В боте' : 'Ожидание'}
            </span>
          </div>
        </div>
        <div class="list-item-actions">
          <button class="btn btn-icon btn-danger" onclick="removeMember('${m.pin}')" title="Удалить">✕</button>
        </div>
      </div>
    `).join('');
  }

  // ═══════════════════════════════════════════
  //  ЗАСЕДАНИЯ
  // ═══════════════════════════════════════════

  function createMeeting() {
    const dateInput = document.getElementById('meetingDate').value;
    const protocol = document.getElementById('meetingProtocol').value.trim();
    if (!dateInput || !protocol) { showToast('Заполните дату и номер протокола'); return; }

    const dateStr = formatDate(dateInput);
    const id = 'm_' + Date.now();
    meetings.push({
      id,
      date: dateStr,
      date_raw: dateInput,
      protocol_number: protocol,
      attendees: [],
      sessions: [],
      status: 'draft'
    });
    saveData();
    renderMeetings();
    sendToBot({ action: 'create_meeting', date: dateStr, protocol_number: protocol });

    document.getElementById('meetingDate').value = '';
    document.getElementById('meetingProtocol').value = '';
    showToast('✅ Заседание создано');
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return `${day}.${m}.${y}`;
  }

  function deleteMeeting(id) {
    if (!confirm('Удалить заседание со всеми данными?')) return;
    meetings = meetings.filter(m => m.id !== id);
    saveData();
    renderMeetings();
    sendToBot({ action: 'delete_meeting', meeting_id: id });
    showToast('Заседание удалено');
  }

  function renderMeetings() {
    const container = document.getElementById('meetingsList');
    if (!meetings.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Нет заседаний</div></div>';
      return;
    }

    container.innerHTML = meetings.map(m => {
      const statusBadge = m.status === 'active'
        ? '<span class="badge badge-active">Активно</span>'
        : m.status === 'closed'
        ? '<span class="badge badge-closed">Завершено</span>'
        : '<span class="badge badge-draft">Черновик</span>';
      return `
        <div class="list-item" onclick="openMeeting('${m.id}')" style="cursor:pointer;">
          <div class="list-item-info">
            <div class="list-item-name">Протокол №${m.protocol_number} ${statusBadge}</div>
            <div class="list-item-detail">📅 ${m.date} · 📂 ${m.sessions.length} сеанс(ов) · 👥 ${m.attendees.length} присут.</div>
          </div>
          <div class="list-item-actions">
            <button class="btn btn-icon btn-danger" onclick="event.stopPropagation(); deleteMeeting('${m.id}')">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Meeting Detail ──
  function openMeeting(id) {
    currentMeetingId = id;
    document.getElementById('meetingsListView').style.display = 'none';
    document.getElementById('meetingDetailView').style.display = 'block';
    document.getElementById('sessionDetailView').style.display = 'none';
    renderMeetingDetail();
  }

  function backToMeetings() {
    currentMeetingId = null;
    document.getElementById('meetingsListView').style.display = 'block';
    document.getElementById('meetingDetailView').style.display = 'none';
    document.getElementById('sessionDetailView').style.display = 'none';
    renderMeetings();
  }

  function backToMeeting() {
    currentSessionId = null;
    document.getElementById('sessionDetailView').style.display = 'none';
    document.getElementById('meetingDetailView').style.display = 'block';
    renderMeetingDetail();
  }

  function renderMeetingDetail() {
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;

    const container = document.getElementById('meetingDetail');
    container.innerHTML = `
      <div class="card">
        <div class="card-title">📋 Заседание — Протокол №${m.protocol_number}</div>
        <div class="card-subtitle">📅 ${m.date}</div>
      </div>

      <!-- Присутствующие -->
      <div class="card">
        <div class="card-title">👥 Присутствующие <span class="badge badge-draft">${m.attendees.length} из ${members.length}</span></div>
        <div style="max-height: 250px; overflow-y: auto;">
          ${members.map(mb => `
            <label class="checkbox-item">
              <input type="checkbox"
                value="${mb.pin}"
                ${m.attendees.includes(mb.pin) ? 'checked' : ''}
                onchange="toggleAttendee('${mb.pin}')">
              <span>${mb.name} <span style="color:var(--hint);font-size:11px">(${mb.pin})</span></span>
            </label>
          `).join('')}
        </div>
        <button class="btn btn-outline btn-small" onclick="selectAllAttendees()" style="margin-top:8px;">Отметить всех</button>
      </div>

      <!-- Сеансы -->
      <div class="card">
        <div class="card-title">📂 Сеансы голосования</div>
        ${m.sessions.length ? m.sessions.map(s => {
          const sBadge = s.status === 'voting'
            ? '<span class="badge badge-active">Голосование</span>'
            : s.status === 'closed'
            ? '<span class="badge badge-closed">Завершён</span>'
            : '<span class="badge badge-draft">Черновик</span>';
          return `
            <div class="list-item" onclick="openSession('${s.id}')" style="cursor:pointer;">
              <div class="list-item-info">
                <div class="list-item-name">${s.title} ${sBadge}</div>
                <div class="list-item-detail">${s.questions.length} вопрос(ов)</div>
              </div>
              <div class="list-item-actions">
                <button class="btn btn-icon btn-danger" onclick="event.stopPropagation(); deleteSession('${s.id}')">✕</button>
              </div>
            </div>
          `;
        }).join('') : '<div class="empty"><div class="empty-text">Нет сеансов. Создайте сеанс для голосования.</div></div>'}
      </div>

      <!-- Добавить сеанс -->
      <div class="card">
        <div class="card-title">➕ Новый сеанс</div>
        <div class="form-group">
          <label>Название сеанса</label>
          <input type="text" id="sessionTitle" placeholder="Напр.: Защита диссертации Иванова И.И.">
        </div>
        <button class="btn btn-primary" onclick="addSession()">Добавить сеанс</button>
      </div>

      <!-- Отчёт -->
      <div class="card">
        <div class="card-title">📄 Отчёт</div>
        <button class="btn btn-outline" onclick="generateReport()">📥 Скачать отчёт (DOCX)</button>
      </div>
    `;
  }

  function toggleAttendee(pin) {
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;
    const idx = m.attendees.indexOf(pin);
    if (idx >= 0) m.attendees.splice(idx, 1);
    else m.attendees.push(pin);
    saveData();
    sendToBot({ action: 'set_attendees', meeting_id: m.id, pins: m.attendees });
  }

  function selectAllAttendees() {
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;
    m.attendees = members.map(mb => mb.pin);
    saveData();
    renderMeetingDetail();
    sendToBot({ action: 'set_attendees', meeting_id: m.id, pins: m.attendees });
    showToast('Все отмечены');
  }

  function addSession() {
    const title = document.getElementById('sessionTitle').value.trim();
    if (!title) { showToast('Введите название сеанса'); return; }

    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;

    const sid = 's_' + Date.now();
    m.sessions.push({ id: sid, title, questions: [], status: 'draft' });
    saveData();
    renderMeetingDetail();
    sendToBot({ action: 'add_session', meeting_id: m.id, title });
    document.getElementById('sessionTitle').value = '';
    showToast('✅ Сеанс добавлен');
  }

  function deleteSession(sid) {
    if (!confirm('Удалить сеанс?')) return;
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;
    m.sessions = m.sessions.filter(s => s.id !== sid);
    saveData();
    renderMeetingDetail();
    sendToBot({ action: 'delete_session', meeting_id: m.id, session_id: sid });
    showToast('Сеанс удалён');
  }

  function generateReport() {
    sendToBot({ action: 'generate_report', meeting_id: currentMeetingId });
    showToast('📄 Отчёт отправлен в чат бота');
    tg.close();
  }

  // ── Session Detail ──
  function openSession(sid) {
    currentSessionId = sid;
    document.getElementById('meetingDetailView').style.display = 'none';
    document.getElementById('sessionDetailView').style.display = 'block';
    renderSessionDetail();
  }

  function renderSessionDetail() {
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;
    const s = m.sessions.find(ss => ss.id === currentSessionId);
    if (!s) return;

    const isVoting = s.status === 'voting';
    const isClosed = s.status === 'closed';
    const isDraft = s.status === 'draft';

    const container = document.getElementById('sessionDetail');
    container.innerHTML = `
      <div class="card">
        <div class="card-title">${s.title}</div>
        <div class="card-subtitle">
          Протокол №${m.protocol_number} · ${m.date}
          ${isVoting ? '<span class="badge badge-active">Голосование идёт</span>' :
            isClosed ? '<span class="badge badge-closed">Завершён</span>' :
            '<span class="badge badge-draft">Черновик</span>'}
        </div>
      </div>

      <!-- Вопросы -->
      <div class="card">
        <div class="card-title">❓ Вопросы (${s.questions.length})</div>
        ${s.questions.length ? s.questions.map((q, i) => `
          <div class="question-item">
            <div class="question-text"><strong>${i+1}.</strong> ${q.text}</div>
            ${isClosed ? `
              <div class="result-bar">
                ${renderBar(q.votes)}
              </div>
              <div class="question-meta">
                ✅ За: ${q.votes.for} · ❌ Против: ${q.votes.against} · ⬜ Воздерж.: ${q.votes.abstain}
                · Всего: ${q.votes.for + q.votes.against + q.votes.abstain}
                · ${q.votes.for > q.votes.against ? '✔️ Принято' : q.votes.for < q.votes.against ? '✖️ Не принято' : '➖ Равны'}
              </div>
            ` : `
              <div class="question-meta">Голосов: ${q.voted_pins ? q.voted_pins.length : 0}</div>
            `}
            ${isDraft ? `<button class="btn btn-icon btn-danger" onclick="deleteQuestion('${q.id}')" style="margin-top:4px;">✕</button>` : ''}
          </div>
        `).join('') : '<div class="empty"><div class="empty-text">Нет вопросов</div></div>'}
      </div>

      <!-- Добавить вопрос (только для черновика) -->
      ${isDraft ? `
        <div class="card">
          <div class="card-title">➕ Добавить вопрос</div>
          <div class="form-group">
            <label>Текст вопроса</label>
            <textarea id="questionText" placeholder="Напр.: Утвердить диссертацию Иванова И.И. на тему..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="addQuestion()">Добавить</button>
        </div>
      ` : ''}

      <!-- Кнопки управления -->
      <div class="card">
        ${isDraft && s.questions.length ? `
          <button class="btn btn-success" onclick="startVoting()">
            🗳 Запустить голосование
          </button>
          <div style="font-size:11px;color:var(--hint);margin-top:6px;text-align:center;">
            Присутствующих: ${m.attendees.length} чел. Убедитесь, что все отмечены.
          </div>
        ` : ''}
        ${isVoting ? `
          <button class="btn btn-danger" onclick="stopVoting()">
            ⏹ Остановить голосование
          </button>
          <div style="font-size:11px;color:var(--hint);margin-top:6px;text-align:center;">
            Голосование идёт. Проголосовавших можно увидеть по количеству у каждого вопроса.
          </div>
        ` : ''}
        ${isClosed ? `
          <button class="btn btn-outline" onclick="generateSessionReport()">
            📄 Отчёт по этому сеансу
          </button>
        ` : ''}
      </div>
    `;
  }

  function renderBar(votes) {
    const total = votes.for + votes.against + votes.abstain;
    if (total === 0) return '<div style="flex:1;color:var(--hint);font-size:11px;">Нет голосов</div>';
    const pFor = Math.round(votes.for / total * 100);
    const pAgainst = Math.round(votes.against / total * 100);
    const pAbstain = 100 - pFor - pAgainst;
    let html = '';
    if (pFor > 0) html += `<div class="bar-for" style="width:${pFor}%">${votes.for}</div>`;
    if (pAgainst > 0) html += `<div class="bar-against" style="width:${pAgainst}%">${votes.against}</div>`;
    if (pAbstain > 0) html += `<div class="bar-abstain" style="width:${pAbstain}%">${votes.abstain}</div>`;
    return html;
  }

  function addQuestion() {
    const text = document.getElementById('questionText').value.trim();
    if (!text) { showToast('Введите текст вопроса'); return; }

    const m = meetings.find(mt => mt.id === currentMeetingId);
    const s = m.sessions.find(ss => ss.id === currentSessionId);
    if (!s) return;

    const qid = 'q_' + Date.now();
    s.questions.push({
      id: qid,
      text,
      votes: { for: 0, against: 0, abstain: 0 },
      voted_pins: []
    });
    saveData();
    renderSessionDetail();
    sendToBot({ action: 'add_question', meeting_id: m.id, session_id: s.id, text });
    showToast('✅ Вопрос добавлен');
  }

  function deleteQuestion(qid) {
    if (!confirm('Удалить вопрос?')) return;
    const m = meetings.find(mt => mt.id === currentMeetingId);
    const s = m.sessions.find(ss => ss.id === currentSessionId);
    if (!s) return;
    s.questions = s.questions.filter(q => q.id !== qid);
    saveData();
    renderSessionDetail();
    sendToBot({ action: 'delete_question', meeting_id: m.id, session_id: s.id, question_id: qid });
    showToast('Вопрос удалён');
  }

  function startVoting() {
    const m = meetings.find(mt => mt.id === currentMeetingId);
    if (!m) return;
    if (m.attendees.length === 0) { showToast('Отметьте присутствующих!'); return; }

    const s = m.sessions.find(ss => ss.id === currentSessionId);
    if (!s) return;

    s.status = 'voting';
    m.status = 'active';
    saveData();
    renderSessionDetail();
    sendToBot({ action: 'start_voting', meeting_id: m.id, session_id: s.id });
    showToast('🗳 Голосование запущено!');
  }

  function stopVoting() {
    if (!confirm('Остановить голосование? Результаты будут зафиксированы.')) return;

    const m = meetings.find(mt => mt.id === currentMeetingId);
    const s = m.sessions.find(ss => ss.id === currentSessionId);
    if (!s) return;

    s.status = 'closed';
    saveData();
    renderSessionDetail();
    sendToBot({ action: 'stop_voting', meeting_id: m.id, session_id: s.id });
    showToast('⏹ Голосование завершено');
  }

  function generateSessionReport() {
    sendToBot({
      action: 'generate_report',
      meeting_id: currentMeetingId,
      session_id: currentSessionId
    });
    showToast('📄 Отчёт отправлен в чат');
    tg.close();
  }

  // ═══════════════════════════════════════════
  //  ACTIVE VOTING TAB
  // ═══════════════════════════════════════════

  function renderActiveVoting() {
    const container = document.getElementById('activeVotingContent');
    let activeCount = 0;

    let html = '';
    for (const m of meetings) {
      for (const s of m.sessions) {
        if (s.status === 'voting') {
          activeCount++;
          const totalVoters = m.attendees.length;
          html += `
            <div class="card">
              <div class="card-title">🗳 ${s.title} <span class="badge badge-active">Идёт</span></div>
              <div class="card-subtitle">Протокол №${m.protocol_number} · ${m.date} · 👥 ${totalVoters} голосующих</div>
              ${s.questions.map((q, i) => {
                const voted = q.voted_pins ? q.voted_pins.length : 0;
                return `
                  <div class="question-item">
                    <div class="question-text"><strong>${i+1}.</strong> ${q.text}</div>
                    <div class="question-meta">Проголосовало: ${voted} из ${totalVoters}</div>
                  </div>
                `;
              }).join('')}
              <button class="btn btn-danger" onclick="quickStopVoting('${m.id}','${s.id}')" style="margin-top:8px;">
                ⏹ Остановить
              </button>
            </div>
          `;
        }
      }
    }

    if (!activeCount) {
      html = '<div class="empty"><div class="empty-icon">🗳</div><div class="empty-text">Нет активных голосований</div></div>';
    }

    container.innerHTML = html;
  }

  function quickStopVoting(mid, sid) {
    if (!confirm('Остановить голосование?')) return;
    const m = meetings.find(mt => mt.id === mid);
    const s = m.sessions.find(ss => ss.id === sid);
    s.status = 'closed';
    saveData();
    renderActiveVoting();
    sendToBot({ action: 'stop_voting', meeting_id: mid, session_id: sid });
    showToast('⏹ Голосование завершено');
  }
</script>
</body>
</html>
